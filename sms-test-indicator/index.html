<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Preview — TEST indicator prototype</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #dfe1e6;
    --border-strong: #c1c7d0;
    --text: #172b4d;
    --text-muted: #5e6c84;
    --text-subtle: #7a869a;
    --primary: #0052cc;
    --primary-hover: #0747a6;
    --focus: #4c9aff;
    --danger: #de350b;
    --bubble-bg: #ebecf0;
    --bubble-text: #172b4d;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Modal shell */
  .modal {
    width: 720px;
    max-width: 100%;
    background: var(--surface);
    border-radius: 8px;
    box-shadow:
      0 12px 24px -6px rgba(9, 30, 66, 0.25),
      0 0 1px rgba(9, 30, 66, 0.31);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 12px;
  }
  .modal-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 20px;
    line-height: 1;
    padding: 4px;
    border-radius: 4px;
  }
  .close-btn:hover { background: var(--bg); }

  .modal-body {
    padding: 8px 24px 24px;
    display: grid;
    grid-template-columns: 1fr 250px;
    gap: 24px;
  }

  /* Form column */
  .field-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .field-label .req {
    color: var(--danger);
    margin-left: 2px;
  }
  .field-help {
    font-size: 12px;
    color: var(--text-subtle);
    margin-top: 4px;
  }

  input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--focus);
    box-shadow: 0 0 0 2px rgba(76, 154, 255, 0.3);
  }

  /* TEST indicator card — visually grouped to highlight the new feature */
  .test-indicator-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    background: #fafbfc;
  }

  .toggle-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .toggle-text .toggle-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .toggle-text .toggle-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* iOS-style switch */
  .switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: var(--border-strong);
    border-radius: 20px;
    transition: background-color 0.18s ease;
  }
  .slider::before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 2px;
    top: 2px;
    background: white;
    border-radius: 50%;
    transition: transform 0.18s ease;
    box-shadow: 0 1px 2px rgba(9,30,66,0.25);
  }
  .switch input:checked + .slider { background-color: var(--primary); }
  .switch input:checked + .slider::before { transform: translateX(16px); }
  .switch input:focus-visible + .slider { box-shadow: 0 0 0 2px rgba(76,154,255,0.5); }

  /* Position segmented control */
  .position-row {
    margin-top: 12px;
    transition: opacity 0.18s ease;
  }
  .position-row.disabled {
    opacity: 0.4;
    pointer-events: none;
  }
  .position-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .segmented {
    display: inline-flex;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface);
  }
  .segmented button {
    appearance: none;
    border: none;
    background: transparent;
    padding: 6px 14px;
    font: inherit;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .segmented button + button { border-left: 1px solid var(--border-strong); }
  .segmented button.active {
    background: var(--primary);
    color: white;
  }
  .segmented button:not(.active):hover { background: var(--bg); }

  /* Preview column — phone */
  .preview-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .phone {
    width: 230px;
    height: 420px;
    background: #1d1d1f;
    border-radius: 32px;
    padding: 12px;
    box-shadow: 0 4px 16px rgba(9,30,66,0.18);
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border-radius: 22px;
    padding: 16px 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sender {
    font-size: 11px;
    color: var(--text-subtle);
    text-align: center;
    margin-bottom: 4px;
  }
  .bubble {
    background: var(--bubble-bg);
    color: var(--bubble-text);
    padding: 9px 12px;
    border-radius: 16px 16px 16px 4px;
    max-width: 85%;
    font-size: 13px;
    line-height: 1.4;
    word-wrap: break-word;
    align-self: flex-start;
  }

  /* MMS — image attachment above bubble */
  .mms-attachment {
    align-self: flex-start;
    max-width: 85%;
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(135deg, #ff7a59 0%, #ffb86c 50%, #ffd166 100%);
    height: 110px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
  }
  .mms-attachment::before {
    content: "";
    position: absolute;
    top: 18px;
    right: 22px;
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
  }
  .mms-attachment::after {
    content: "";
    position: absolute;
    bottom: -28px;
    left: -10px;
    right: -10px;
    height: 60px;
    background: linear-gradient(135deg, #6a4dff 0%, #b06bff 100%);
    transform: rotate(-8deg);
    border-radius: 50%;
  }
  .mms-attachment .mms-caption {
    position: relative;
    z-index: 2;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    margin: 8px;
  }

  /* RCS — branded look: avatar + sender name + verified, slightly different bubble */
  .rcs-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 2px;
    margin-bottom: 2px;
  }
  .rcs-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b8def 0%, #8e54e9 100%);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .rcs-meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .rcs-meta .rcs-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .rcs-meta .rcs-name::after {
    content: "✓";
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    background: #1d8cf8;
    color: white;
    font-size: 9px;
    border-radius: 50%;
    font-weight: 700;
  }
  .rcs-meta .rcs-sub {
    font-size: 9px;
    color: var(--text-subtle);
  }
  .bubble.rcs {
    background: #e1f0ff;
    border-radius: 14px;
  }

  /* Footer */
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: #fafbfc;
  }
  .btn {
    appearance: none;
    border: 1px solid transparent;
    padding: 8px 16px;
    border-radius: 4px;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .btn-secondary {
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-hover); }

  /* "Demo controls" — outside the modal so reviewer can swap channels */
  .demo-controls {
    width: 720px;
    max-width: 100%;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text-muted);
    font-size: 12px;
  }
  .channel-pills {
    display: inline-flex;
    gap: 6px;
  }
  .pill {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .pill.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .demo-note {
    font-style: italic;
  }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;align-items:center;">
  <div class="demo-controls">
    <div class="channel-pills">
      <button class="pill active" data-channel="SMS">SMS</button>
      <button class="pill" data-channel="MMS">MMS</button>
      <button class="pill" data-channel="RCS">RCS</button>
    </div>
    <span class="demo-note">Prototype only — swap channel to preview indicator behavior</span>
  </div>

  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title">Send a preview</h2>
      <button class="close-btn" aria-label="Close">×</button>
    </div>

    <div class="modal-body">
      <!-- Form column -->
      <div class="field-stack">
        <div>
          <label class="field-label" for="phone">
            Phone number<span class="req">*</span>
          </label>
          <input id="phone" type="text" placeholder="Enter a phone number" value="555 867 5309" />
          <div class="field-help">US numbers only at this time</div>
        </div>

        <!-- NEW: TEST indicator card -->
        <div class="test-indicator-card">
          <div class="toggle-row">
            <div class="toggle-text">
              <div class="toggle-title">Add TEST indicator to preview</div>
              <div class="toggle-sub">Marks the preview so it’s easy to tell apart from real sends. Only applies to this preview.</div>
            </div>
            <label class="switch" aria-label="Add TEST indicator to preview">
              <input id="indicator-toggle" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="position-row disabled" id="position-row">
            <span class="position-label">Position</span>
            <div class="segmented" role="radiogroup" aria-label="Indicator position">
              <button type="button" class="active" data-position="start" role="radio" aria-checked="true">Start</button>
              <button type="button" data-position="end" role="radio" aria-checked="false">End</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Preview column -->
      <div class="preview-col">
        <div class="phone">
          <div class="phone-screen" id="phone-screen">
            <!-- Content injected by script based on channel -->
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Send Preview</button>
    </div>
  </div>
</div>

<script>
  const messageBody = "Hey Alex! 🎉 New drop is live — your 15% off code is HEYALEX. Reply STOP to opt out.";
  // SMS/MMS must lead with {shop.name}; RCS omits it since the verified sender header already shows the brand.
  const smsBaseMessage = `{shop.name}: ${messageBody}`;
  const rcsBaseMessage = messageBody;

  const toggle = document.getElementById('indicator-toggle');
  const positionRow = document.getElementById('position-row');
  const positionButtons = positionRow.querySelectorAll('button');
  const phoneScreen = document.getElementById('phone-screen');
  const channelPills = document.querySelectorAll('.channel-pills .pill');

  let position = 'start';
  let channel = 'SMS';

  function buildMessageText() {
    const base = channel === 'RCS' ? rcsBaseMessage : smsBaseMessage;
    if (!toggle.checked) return base;
    return position === 'start' ? `[TEST] ${base}` : `${base} [TEST]`;
  }

  function render() {
    positionRow.classList.toggle('disabled', !toggle.checked);
    positionButtons.forEach((b) => b.setAttribute('aria-checked', b.dataset.position === position));

    const text = buildMessageText();
    phoneScreen.innerHTML = '';

    if (channel === 'SMS') {
      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = '+1 (555) 123-4567';
      phoneScreen.appendChild(sender);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      phoneScreen.appendChild(bubble);
    } else if (channel === 'MMS') {
      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = '+1 (555) 123-4567';
      phoneScreen.appendChild(sender);

      const attachment = document.createElement('div');
      attachment.className = 'mms-attachment';
      const caption = document.createElement('div');
      caption.className = 'mms-caption';
      caption.textContent = 'new-drop.jpg';
      attachment.appendChild(caption);
      phoneScreen.appendChild(attachment);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      phoneScreen.appendChild(bubble);
    } else if (channel === 'RCS') {
      const header = document.createElement('div');
      header.className = 'rcs-header';
      const avatar = document.createElement('div');
      avatar.className = 'rcs-avatar';
      avatar.textContent = 'YB';
      const meta = document.createElement('div');
      meta.className = 'rcs-meta';
      const name = document.createElement('div');
      name.className = 'rcs-name';
      name.textContent = 'Your Brand';
      const sub = document.createElement('div');
      sub.className = 'rcs-sub';
      sub.textContent = 'Verified business';
      meta.appendChild(name);
      meta.appendChild(sub);
      header.appendChild(avatar);
      header.appendChild(meta);
      phoneScreen.appendChild(header);

      const bubble = document.createElement('div');
      bubble.className = 'bubble rcs';
      bubble.textContent = text;
      phoneScreen.appendChild(bubble);
    }
  }

  toggle.addEventListener('change', render);
  positionButtons.forEach((b) => {
    b.addEventListener('click', () => {
      position = b.dataset.position;
      positionButtons.forEach((bb) => bb.classList.toggle('active', bb === b));
      render();
    });
  });

  channelPills.forEach((p) => {
    p.addEventListener('click', () => {
      channelPills.forEach((pp) => pp.classList.toggle('active', pp === p));
      channel = p.dataset.channel;
      render();
    });
  });

  render();
</script>

</body>
</html>
